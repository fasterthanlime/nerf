[package]
name = "nperf"
version = "0.1.1"
edition = "2018"

[dependencies]
structopt = "0.2"
log = "0.4"
env_logger = "0.11"
nperf-core = { path = "..", default-features = false }

[dependencies.nperf-live]
path = "../nperf-live"

[dependencies.tokio]
version = "1"
features = ["rt-multi-thread"]

[features]
default = ["addr2line"]
addr2line = ["nperf-core/addr2line"]
debug-logs = ["nperf-core/debug-logs"]
