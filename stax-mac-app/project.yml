name: stax
options:
  bundleIdPrefix: eu.bearcove
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  defaultConfig: Release
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: B2N6FSRTPV
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
  configs:
    Debug:
      SWIFT_COMPILATION_MODE: incremental
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      ONLY_ACTIVE_ARCH: YES
      DEBUG_INFORMATION_FORMAT: dwarf
      OTHER_SWIFT_FLAGS:
        - "$(inherited)"
        - "-Xfrontend"
        - "-warn-long-function-bodies=100"
        - "-Xfrontend"
        - "-warn-long-expression-type-checking=100"
    Release:
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      ONLY_ACTIVE_ARCH: NO
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  vox:
    path: ../../vox/swift/vox-runtime

targets:
  stax:
    type: application
    platform: macOS
    sources:
      - path: stax
        excludes:
          - stax.entitlements
          - Fonts
      - path: stax/Fonts
        type: folder
        buildPhase: resources
    dependencies:
      - package: vox
        product: VoxRuntime
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: eu.bearcove.stax
        PRODUCT_NAME: stax
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: stax
        INFOPLIST_KEY_NSHumanReadableCopyright: "© bearcove"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_ATSApplicationFontsPath: Fonts
        # Sandbox is off for now — the Mac app reaches stax-server's
        # unix socket at /tmp/stax-server-<uid>.sock, which sandbox's
        # file-access policy blocks. Group-container migration is the
        # eventual home; until then, hardened-runtime stays on but
        # sandbox is disabled.
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: stax/stax.entitlements
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: stax/stax.entitlements
      properties:
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
